# Pre-commit hooks for the nanoGLD repo (V1-SPEC §46).
#
# Install once locally:
#     uv tool install pre-commit
#     pre-commit install
# Run on the whole repo:
#     pre-commit run --all-files
#
# Hooks:
#   - gitleaks: scan staged diff for accidental secrets (HF tokens, AWS
#     keys, etc.) BEFORE the first commit. Hard-fails if any rule matches.
#   - ruff: lint + auto-fix Python.
#   - ruff-format: format with double quotes (matches pyproject.toml).
#   - mypy: type-check src/ (strict; fails on first error).
#   - check-merge-conflict / end-of-file-fixer / trailing-whitespace /
#     check-yaml / check-toml: hygiene basics.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-executables-have-shebangs

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--strict", "--ignore-missing-imports"]
        # Heavy hook; only re-runs when src/** changes.
        files: ^src/
        additional_dependencies:
          - "torch>=2.11.0,<2.12"
          - "numpy>=2.0"
          - "pandas>=2.2"
